services:
  postgres:
    image: postgres:16-alpine
    container_name: fleet_postgres
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: fleet_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U root -d fleet_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fleet_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: fleet_keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: adminPassword
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/fleet_db
      KC_DB_USERNAME: root
      KC_DB_PASSWORD: rootpassword
      KC_DB_SCHEMA: keycloak
    ports:
      - "8180:8080"
    volumes:
      - ./docker/keycloak:/opt/keycloak/data/import
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200'" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  fleet-notification-hub:
    build:
      context: .
      dockerfile: infrastructure/Dockerfile
    container_name: fleet_notification_hub
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/fleet_db
      DB_USERNAME: root
      DB_PASSWORD: rootpassword
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/fleet
      FLEET_SECURITY_ENABLED: "true"
      SPRING_PROFILES_ACTIVE: prod
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy

volumes:
  postgres_data:
