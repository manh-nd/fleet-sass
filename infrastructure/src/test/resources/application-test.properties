# Test application properties — overrides application.yml for Spring Boot integration tests
# This file is automatically loaded when @SpringBootTest is used

# Use simple in-memory cache — no Redis CacheManager needed in tests.
# Redis is still available via Testcontainers for cooldown (RedisTemplate), just not for @Cacheable.
spring.cache.type=simple

# Disable JWT/Keycloak security — no Keycloak container in tests
fleet.security.enabled=false
