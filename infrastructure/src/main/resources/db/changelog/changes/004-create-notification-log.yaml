databaseChangeLog:
  - changeSet:
      id: 004-create-notification-log
      author: fleet-team
      comment: "Creates the notification_log table for delivery audit trail and observability."
      changes:
        - createTable:
            tableName: notification_log
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: service_id
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: channel
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
                  comment: "EMAIL | SMS | WEBHOOK | PUSH"
              - column:
                  name: recipient
                  type: VARCHAR(500)
                  constraints:
                    nullable: false
              - column:
                  name: rendered_content
                  type: TEXT
              - column:
                  name: status
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
                  comment: "QUEUED | SENT | DELIVERED | FAILED"
              - column:
                  name: fail_reason
                  type: TEXT
              - column:
                  name: attempts
                  type: INT
                  defaultValueNumeric: 0
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP

        - createIndex:
            tableName: notification_log
            indexName: idx_notification_log_tenant
            columns:
              - column:
                  name: tenant_id
              - column:
                  name: id
            comment: "Cursor-based pagination index"

        - createIndex:
            tableName: notification_log
            indexName: idx_notification_log_status
            columns:
              - column:
                  name: tenant_id
              - column:
                  name: status
            comment: "Filter by tenant + delivery status for monitoring dashboards"
