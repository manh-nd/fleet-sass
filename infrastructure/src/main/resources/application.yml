spring:
  application:
    name: fleet-notification-hub

  # PostgreSQL datasource — credentials sourced from environment variables with local dev defaults
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/fleet_db}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:rootpassword}
    driver-class-name: org.postgresql.Driver

  # Liquibase schema migrations — auto-runs on startup
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true

  # Redis connection
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  # Keycloak JWT resource server
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/fleet}

# Fleet custom configuration
fleet:
  # Security — set to false for local dev without Keycloak
  security:
    enabled: ${FLEET_SECURITY_ENABLED:true}

  # Push notification
  push:
    fcm:
      enabled: ${FLEET_FCM_ENABLED:false}

logging:
  level:
    com.fleet: DEBUG
    org.springframework.security: INFO