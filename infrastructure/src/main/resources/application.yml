spring:
  application:
    name: fleet-saas

  # PostgreSQL datasource — credentials sourced from environment variables with local dev defaults
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/fleet_db}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:rootpassword}
    driver-class-name: org.postgresql.Driver

  # Liquibase schema migrations — auto-runs on startup
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true

  # Redis connection
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

logging:
  level:
    com.fleet: DEBUG